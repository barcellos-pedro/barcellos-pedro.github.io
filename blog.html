---
layout: default
title: Blog
---
<h1>Latest Posts</h1>

<a href="/">Back to Home</a>

{% if site.posts.size > 0 %}
<ul>
    {% for post in site.posts %}
    <li>
        <h2>
            <a href="{{ post.url }}">{{ post.title }}</a>
        </h2>
        {{ post.excerpt }}
    </li>
    {% endfor %}
</ul>
{% else %}
<p style="color: var(--text-muted); text-align: center; padding: 3rem 0;">No posts yet.</p>
{% endif %}
