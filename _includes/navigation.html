<nav class="site-nav">
  {% for item in site.data.navigation %}
  {% assign active = false %}
  {% if page.url == item.link %}
    {% assign active = true %}
  {% elsif item.link == '/blog.html' and page.url contains '/blog' %}
    {% assign active = true %}
  {% endif %}
  <a href="{{ item.link }}" {% if active %}class="active"{% endif %}>
    {{ item.name }}
  </a>
  {% endfor %}
</nav>
