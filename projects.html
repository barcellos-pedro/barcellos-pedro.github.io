---
layout: default
title: Projects
---
{% assign repos = site.data.repos %}

<div class="section-header">
    <h1>All Projects ({{ repos.size }})</h1>
    <a href="/">&larr; Back to Home</a>
</div>

<div class="project-grid">
    {% for repo in repos %}
        {% include repo.html repo=repo %}
    {% else %}
    <p style="color: var(--text-muted); text-align: center; padding: 3rem 0; width: 100%;">No projects yet.</p>
    {% endfor %}
</div>
